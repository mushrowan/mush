# cargo-deny config — license, advisory, ban, and source checks

[graph]
targets = []
all-features = false

[advisories]
ignore = [
  # transitive deps from fastembed/tokenizers, can't fix directly
  { id = "RUSTSEC-2024-0375", reason = "atty via fastembed→tokenizers" },
  { id = "RUSTSEC-2025-0141", reason = "bincode via fastembed" },
  { id = "RUSTSEC-2024-0436", reason = "paste via fastembed→tokenizers" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "OpenSSL",
  "BSL-1.0",
  "MPL-2.0",
  "CC0-1.0",
  "NCSA",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
